backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;

active-opacity = 0.9;
inactive-opacity = 0.9;
frame-opacity = 1;
inactive-opacity-override = false;

corner-radius = 0;

animations = true;
animation-stiffness = 150;
animation-dampening = 17;
animation-clamping = false;
animation-mass = 0;
animation-for-open-window = "zoom";
animation-for-menu-window = "slide-down";
animation-for-transient-window = "slide-down";
animation-for-workspace-switch-in = "slide-down";
animation-for-workspace-switch-out = "slide-down";
animation-for-close-window = "zoom";

mark-wmwin-focused = true;
mark-ovredir-focused = false;
detect-rounded-corners = true;
detect-client-opacity = true;
vsync = true;
dbe = false;
unredir-if-possible = false;
detect-transient = true;
detect-client-leader = true;

opacity-rule = [ "70:class_g = 'dwm' && !focused", "60:class_g = 'Alacritty'"];
