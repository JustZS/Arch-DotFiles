backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;

# Opacity
active-opacity = 0.5;
inactive-opacity = 0.5;
frame-opacity = 1;
inactive-opacity-override = false;

blur-background = true;
blur-method = "dual_kawase";
blur-strength = 5;

# Enabled client-side shadows on windows.
shadow = false;
# The blur radius for shadows. (default 12)
shadow-radius = 0;
# The left offset for shadows. (default -15)
shadow-offset-x = -15;
# The top offset for shadows. (default -15)
shadow-offset-y = -15;
# The translucency for shadows. (default .75)
shadow-opacity = 0;

# Set if you want different colour shadows
# shadow-red = 0.0;
# shadow-green = 0.0;
# shadow-blue = 0.0;

corner-radius = 0;

animations = true;
animation-stiffness = 100;
animation-dampening = 10;
animation-clamping = true;
animation-mass = 0;
animation-for-open-window = "zoom";
animation-for-menu-window = "slide-down";
animation-for-transient-window = "slide-down";

animation-for-workspace-switch-in = "slide-down";
animation-for-workspace-switch-out = "slide-down";

# Other
mark-wmwin-focused = true;
mark-ovredir-focused = false;
detect-rounded-corners = true;
detect-client-opacity = true;
vsync = true;
dbe = false;
unredir-if-possible = false;
focus-exclude = [ ];
detect-transient = true;
detect-client-leader = true;

opacity-rule = [ "90:class_g = 'dwm'", "100:class_g = 'firefox'", "100:class_g = 'anki'", "90:class_g = 'Zathura'", "100:class_g = 'libreoffice-writer'", "100:class_g = 'Elden Ring'" ];

#rounded-corners-exclude = ["class_g = 'dwm'",]
